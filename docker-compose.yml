version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: cs-skin-db
    environment:
      POSTGRES_USER: ${DB_USER:-csadmin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password}
      POSTGRES_DB: ${DB_NAME:-cs_skin_platform}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-csadmin} -d ${DB_NAME:-cs_skin_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cs-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: cs-skin-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cs-network
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cs-skin-backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      DATABASE_URL: postgresql://${DB_USER:-csadmin}:${DB_PASSWORD:-secure_password}@postgres:5432/${DB_NAME:-cs_skin_platform}
      DB_HOST: postgres
      DB_USER: ${DB_USER:-csadmin}
      DB_PASSWORD: ${DB_PASSWORD:-secure_password}
      DB_NAME: ${DB_NAME:-cs_skin_platform}
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-your-refresh-secret-change-in-production}
      STEAM_API_KEY: ${STEAM_API_KEY}
      STEAM_REALM: ${STEAM_REALM:-http://localhost:5000}
      STEAM_RETURN_URL: ${STEAM_RETURN_URL:-http://localhost:5000/api/auth/steam/return}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      SESSION_SECRET: ${SESSION_SECRET:-session-secret-key}
      MARKET_SYNC_INTERVAL: ${MARKET_SYNC_INTERVAL:-300000}
      DATA_PROCESSING_INTERVAL: ${DATA_PROCESSING_INTERVAL:-600000}
      USE_REAL_DATA: ${USE_REAL_DATA:-false}
      SKINPORT_API_KEY: ${SKINPORT_API_KEY:-}
      CSFLOAT_API_KEY: ${CSFLOAT_API_KEY:-}
      PRICEMPIRE_API_KEY: ${PRICEMPIRE_API_KEY:-}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cs-network
    restart: unless-stopped
    command: npm run dev

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cs-skin-frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000/api}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - cs-network
    restart: unless-stopped
    command: npm run dev

  # Nginx Reverse Proxy (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: cs-skin-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - cs-network
    restart: unless-stopped
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:

networks:
  cs-network:
    driver: bridge
